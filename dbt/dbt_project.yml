name: ecommerce_olist
version: "1.0.0"
config-version: 2

profile: ecommerce_olist

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ecommerce_olist:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts", "reporting"]

vars:
  # source dataset names (overridden per target where needed)
  gold_dataset: "ecom_gold"
  start_date: "2016-09-01"
