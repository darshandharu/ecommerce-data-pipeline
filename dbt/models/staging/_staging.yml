version: 2

models:
  - name: stg_orders
    description: "Cleaned, typed one-row-per-order staging model."
    columns:
      - name: order_id
        description: "Natural key of an order."
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        tests:
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable, invoiced, processing, created, approved]
      - name: order_value
        description: "items_total + freight_total for the order."

  - name: stg_order_items
    description: "One row per item within an order."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        tests:
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: price
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_sellers
    columns:
      - name: seller_id
        tests: [not_null, unique]
