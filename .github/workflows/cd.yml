name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: airflow/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/airflow:latest

      - name: Build & push Spark image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/spark.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/spark:latest

  deploy-dags:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.COMPOSER_DAG_BUCKET != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync DAGs to Cloud Composer bucket
        run: |
          gsutil -m rsync -r -d dags gs://${{ secrets.COMPOSER_DAG_BUCKET }}/dags
          gsutil -m rsync -r pyspark_jobs gs://${{ secrets.COMPOSER_DAG_BUCKET }}/dags/pyspark_jobs
          gsutil -m rsync -r configs gs://${{ secrets.COMPOSER_DAG_BUCKET }}/dags/configs
